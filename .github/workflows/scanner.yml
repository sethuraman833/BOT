name: SMC Scanner — 24/7 Background Scanner

on:
  # Triggered by cron-job.org via GitHub API every 15 minutes
  repository_dispatch:
    types: [smc_scan]

  # Allow manual trigger for testing
  workflow_dispatch:

  # Automatic trigger on push to main to verify syntax/logic
  push:
    branches: [ main ]
    paths:
      - 'src/engine/**'
      - 'worker/**'
      - '.github/workflows/scanner.yml'

  # Backup schedule (UTC)
  schedule:
    - cron: '10,25,40,55 * * * *'

jobs:
  scan:
    name: Run SMC Analysis Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Stable LTS

      - name: Install Dependencies
        run: npm install

      - name: Run SMC Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node worker/run-once.mjs
