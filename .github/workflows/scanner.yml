name: SMC Scanner — 24/7 Background Scanner
# Last updated: 2026-04-21 18:55 IST — Nudging scheduler

on:
  # Run automatically every 15 minutes around the clock
  schedule:
    - cron: '*/15 * * * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  scan:
    name: Run SMC Analysis Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run SMC Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scanner/scanner.mjs
