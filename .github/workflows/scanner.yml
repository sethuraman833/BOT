name: SMC Scanner — 24/7 Background Scanner
# Last updated: 2026-04-21 18:55 IST — Nudging scheduler

on:
  # Triggered by cron-job.org via GitHub API every 15 minutes (reliable!)
  repository_dispatch:
    types: [smc_scan]

  # Keep manual trigger for testing
  workflow_dispatch:

  # Backup schedule in case cron-job.org is down
  schedule:
    - cron: '2,17,32,47 * * * *'

jobs:
  scan:
    name: Run SMC Analysis Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run SMC Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scanner/scanner.mjs
